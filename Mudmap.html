<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rail Mud Map Tool</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #1a252f; color: white; overflow: hidden; }
        #sidebar { width: 260px; background: #2c3e50; padding: 15px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10; }
        #canvas-area { flex-grow: 1; background: #ecf0f1; display: flex; justify-content: center; align-items: center; position: relative; }
        canvas { border: 1px solid #bdc3c7; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        h2 { color: #1abc9c; font-size: 1.2rem; margin-top: 0; }
        .section { font-size: 0.7rem; color: #95a5a6; text-transform: uppercase; margin: 15px 0 5px; letter-spacing: 1px; }
        .btn { background: #34495e; color: white; border: none; padding: 12px; width: 100%; margin-bottom: 8px; cursor: pointer; border-radius: 6px; font-weight: 600; text-align: left; transition: 0.2s; }
        .btn:active { transform: scale(0.98); background: #1abc9c; }
        .btn-save { background: #27ae60; margin-top: auto; text-align: center; }
        .btn-del { background: #c0392b; text-align: center; }
        
        input { background: #34495e; border: 1px solid #5d6d7e; color: white; padding: 10px; border-radius: 4px; margin-bottom: 10px; width: calc(100% - 22px); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Rail Mud Map</h2>
    <input type="text" id="worksite" placeholder="Worksite Name">
    
    <div class="section">Infrastructure</div>
    <button class="btn" onclick="addTrack()">➕ Straight Track</button>
    <button class="btn" onclick="addTurnout('L')">⬅️ Left Turnout</button>
    <button class="btn" onclick="addTurnout('R')">➡️ Right Turnout</button>
    <button class="btn" onclick="addCrossover()">✖️ Crossover</button>
    
    <div class="section">Labels</div>
    <button class="btn" onclick="addText()">📝 Add Label</button>
    
    <div class="section">Actions</div>
    <button class="btn btn-del" onclick="deleteObj()">🗑️ Delete Selected</button>
    <button class="btn btn-save" onclick="exportMap()">💾 Save to ONRSR Folder</button>
</div>

<div id="canvas-area">
    <canvas id="c" width="800" height="600"></canvas>
</div>

<script>
        // 1. Initialize Canvas with Auto-Resize for Android
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 300, // Adjusts to your screen width
        height: window.innerHeight - 50,
        backgroundColor: '#ffffff'
    });

    // 2. High-Visibility Settings for Tracks
    
function addTrack() {
    console.log("Button clicked - Creating Track...");
    
    const track = new fabric.Rect({
        left: 50,
        top: 50,
        width: 250, 
        height: 20,
        fill: '#333333',     // Dark Grey fill
        stroke: '#ff0000',   // BRIGHT RED BORDER (to see if it's there)
        strokeWidth: 2,
        opacity: 1,          // Ensure it's not transparent
        visible: true,
        selectable: true,
        hasControls: true,
        cornerSize: 30,      // Large handles
        cornerColor: '#1abc9c',
        transparentCorners: false
    });

    canvas.add(track);
    canvas.moveTo(track, 999); // Bring to the absolute front
    canvas.setActiveObject(track);
    canvas.renderAll(); 
    
    console.log("Track should now be visible at top left.");
}

    // 3. Add a "Clear All" in case things get messy
    function clearCanvas() {
        if(confirm("Clear the whole map?")) {
            canvas.clear();
            canvas.backgroundColor = '#ffffff';
        }
    }

</script>
</body>
</html>
